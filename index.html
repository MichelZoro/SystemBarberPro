<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Pro Elite | Cloud Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1c1e 0%, #2d3436 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }
        .cactus-gray { color: #85929E; }
        .bg-cactus { background-color: #85929E; }
        .accent-gold { color: #D4AF37; }
        .hidden { display: none !important; }
        
        input, select {
            background: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }
        input:focus { border-color: #85929E; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col min-h-screen">

    <div class="max-w-6xl mx-auto w-full flex-grow">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-light tracking-widest uppercase">Barber <span class="font-bold accent-gold">Elite</span></h1>
                <p class="cactus-gray text-[10px] uppercase tracking-widest" id="app-status">Cloud Sync Active</p>
            </div>
            <button id="btn-logout" onclick="cerrarSesion()" class="hidden px-4 py-2 rounded-full border border-red-500/50 text-red-400 hover:bg-red-500/10 transition text-sm">Salir</button>
        </header>

        <main>
            <section id="view-cliente" class="space-y-6">
                <div class="glass-card p-8 max-w-2xl mx-auto text-center border-t-4 border-accent-gold">
                    <h2 class="text-2xl mb-6 font-semibold">Reserva tu Turno</h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 text-left">
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] cactus-gray ml-2">TU NOMBRE</label>
                            <input type="text" id="c-nombre" placeholder="Ej: Juan Pérez">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] cactus-gray ml-2">ELEGIR BARBERO</label>
                            <select id="c-barbero" onchange="cambiarBarberoCliente()"></select>
                        </div>
                    </div>

                    <p class="text-xs cactus-gray mb-3 uppercase tracking-widest">Horarios disponibles</p>
                    <div id="c-slots" class="grid grid-cols-3 md:grid-cols-4 gap-2 mb-8"></div>

                    <div class="grid grid-cols-1 gap-3">
                        <button onclick="abrirPago()" class="py-4 bg-white text-black font-bold rounded-xl hover:bg-cactus transition uppercase text-sm">Pagar Seña (Transferencia)</button>
                        <button onclick="confirmarReserva('Efectivo')" class="py-4 border border-white/20 rounded-xl hover:bg-white/5 transition uppercase text-sm">Reservar (Pago en Local)</button>
                    </div>
                </div>
            </section>

            <div id="modal-pago" class="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center p-4 hidden z-50">
                <div class="glass-card p-8 max-w-sm w-full text-center border border-accent-gold/30">
                    <h3 class="text-xl font-bold mb-4">Transferencia Bancaria</h3>
                    <p class="text-sm cactus-gray mb-2">Barbero: <span id="pago-barbero-nombre" class="text-white font-bold"></span></p>
                    <div class="bg-white/5 p-4 rounded-lg mb-6 border border-cactus/30">
                        <p class="text-[10px] uppercase cactus-gray">Alias de cuenta:</p>
                        <p id="pago-alias" class="text-lg font-mono text-accent-gold mt-1"></p>
                    </div>
                    <button onclick="confirmarReserva('Transferencia')" class="w-full py-3 bg-cactus text-gray-900 font-bold rounded-lg mb-2">Confirmar Pago</button>
                    <button onclick="cerrarModal()" class="w-full py-3 text-sm opacity-50">Cancelar</button>
                </div>
            </div>

            <section id="view-interno" class="hidden space-y-6">
                <div id="admin-stats" class="grid grid-cols-1 md:grid-cols-3 gap-4 hidden">
                    <div class="glass-card p-6 border-l-4 border-green-500">
                        <p class="text-[10px] uppercase cactus-gray">Caja Estimada</p>
                        <h4 id="stat-caja" class="text-2xl font-bold">$0</h4>
                    </div>
                    <div onclick="verTab('config')" class="glass-card p-6 border-l-4 border-accent-gold cursor-pointer hover:bg-white/5">
                        <p class="text-[10px] uppercase cactus-gray">Panel de Control</p>
                        <h4 class="text-xl font-bold">Ajustes & Personal</h4>
                    </div>
                    <div class="glass-card p-6 border-l-4 border-red-500">
                        <p class="text-[10px] uppercase cactus-gray">Insumos</p>
                        <h4 id="stat-insumos" class="text-2xl font-bold">$0</h4>
                    </div>
                </div>

                <div class="flex gap-2 overflow-x-auto pb-2" id="admin-tabs"></div>

                <div id="tab-agenda" class="glass-card p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold">Agenda: <span id="agenda-nombre" class="accent-gold"></span></h3>
                        <button onclick="cargarGasto()" class="text-xs bg-red-900/30 text-red-400 border border-red-500/20 px-3 py-2 rounded-lg">+ Gasto</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="text-[10px] uppercase cactus-gray border-b border-white/10">
                                <tr>
                                    <th class="p-3">Hora</th>
                                    <th class="p-3">Cliente</th>
                                    <th class="p-3">Pago</th>
                                    <th class="p-3">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="agenda-body"></tbody>
                        </table>
                    </div>
                </div>

                <div id="tab-config" class="glass-card p-6 hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold">Ajustes del Sistema</h3>
                        <button onclick="verTab('agenda')" class="text-xs opacity-50 underline">Volver a Agenda</button>
                    </div>
                    
                    <div class="mb-8 p-4 bg-white/5 rounded-xl border border-accent-gold/20">
                        <p class="text-xs font-bold text-accent-gold mb-3 uppercase">Seguridad Administrador</p>
                        <div class="flex gap-2">
                            <input type="text" id="cfg-admin-pin" placeholder="Nuevo PIN Admin" class="flex-grow text-sm">
                            <button onclick="cambiarPinAdmin()" class="bg-white/10 px-4 rounded-lg text-xs hover:bg-white/20">Actualizar</button>
                        </div>
                    </div>

                    <p class="text-xs font-bold text-cactus-gray mb-3 uppercase">Equipo de Barberos</p>
                    <div id="config-list" class="space-y-4 mb-6"></div>
                    
                    <button onclick="agregarBarbero()" class="w-full py-4 border-2 border-dashed border-white/20 rounded-xl text-sm cactus-gray hover:border-cactus hover:text-white transition">
                        + Agregar Nuevo Barbero
                    </button>

                    <button onclick="guardarConfiguracion()" class="mt-8 w-full py-4 bg-white text-black font-bold rounded-xl shadow-lg">Guardar Todo y Sincronizar</button>
                </div>
            </section>
        </main>
    </div>

    <footer class="text-center p-8 mt-auto">
        <button onclick="pedirAcceso()" class="opacity-10 hover:opacity-100 transition text-2xl">🔒</button>
    </footer>

    <script>
        const HORARIOS_BASE = ["09:00","09:30","10:00","10:30","11:00","11:30","15:00","15:30","16:00","16:30","17:00","17:30"];
        
        // Base de datos inicial
        let db = JSON.parse(localStorage.getItem('barber_db')) || {
            barberos: [
                { id: Date.now(), nombre: "Franco", alias: "franco.mp", pin: "1111", turnos: {} }
            ],
            insumos: [],
            admin_pin: "admin"
        };

        let barberoActivoID = db.barberos[0]?.id;
        let horaSeleccionada = null;
        let esModoAdmin = false;

        function save() {
            localStorage.setItem('barber_db', JSON.stringify(db));
        }

        // --- FUNCIONES DE ADMINISTRACIÓN ---
        function agregarBarbero() {
            const nuevo = {
                id: Date.now(),
                nombre: "Nuevo Barbero",
                alias: "alias.mp",
                pin: "0000",
                turnos: {}
            };
            db.barberos.push(nuevo);
            renderConfig();
        }

        function eliminarBarbero(id) {
            if(db.barberos.length === 1) return alert("Debe haber al menos un barbero.");
            if(confirm("¿Seguro que quieres eliminar a este barbero? Perderás su agenda.")) {
                db.barberos = db.barberos.filter(b => b.id !== id);
                if(barberoActivoID === id) barberoActivoID = db.barberos[0].id;
                renderConfig();
            }
        }

        function cambiarPinAdmin() {
            const nuevoPin = document.getElementById('cfg-admin-pin').value;
            if(nuevoPin.length < 4) return alert("PIN muy corto.");
            db.admin_pin = nuevoPin;
            alert("PIN de administrador actualizado. No lo olvides.");
        }

        // --- RENDERIZADO CONFIG ---
        function renderConfig() {
            const container = document.getElementById('config-list');
            document.getElementById('cfg-admin-pin').value = db.admin_pin;
            
            container.innerHTML = db.barberos.map((b) => `
                <div class="p-4 glass-card border border-white/10 space-y-3 relative">
                    <button onclick="eliminarBarbero(${b.id})" class="absolute top-4 right-4 text-red-500 opacity-50 hover:opacity-100 font-bold text-xl">✕</button>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <div class="flex flex-col gap-1">
                            <label class="text-[9px] cactus-gray">NOMBRE</label>
                            <input type="text" onchange="updateB(${b.id}, 'nombre', this.value)" value="${b.nombre}" class="text-sm">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[9px] cactus-gray">ALIAS MERCADO PAGO</label>
                            <input type="text" onchange="updateB(${b.id}, 'alias', this.value)" value="${b.alias}" class="text-sm">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[9px] cactus-gray">PIN ACCESO (4 DÍGITOS)</label>
                            <input type="text" onchange="updateB(${b.id}, 'pin', this.value)" value="${b.pin}" class="text-sm">
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateB(id, campo, valor) {
            const b = db.barberos.find(x => x.id === id);
            if(b) b[campo] = valor;
        }

        function guardarConfiguracion() {
            save();
            alert("Sincronizando datos...");
            location.reload();
        }

        // --- LÓGICA DE TURNOS (SIMILAR A ANTERIOR) ---
        function inicializarApp() {
            const select = document.getElementById('c-barbero');
            select.innerHTML = db.barberos.map(b => `<option value="${b.id}">${b.nombre}</option>`).join('');
            if(!barberoActivoID && db.barberos.length > 0) barberoActivoID = db.barberos[0].id;
            renderSlotsCliente();
        }

        function cambiarBarberoCliente() {
            barberoActivoID = parseInt(document.getElementById('c-barbero').value);
            renderSlotsCliente();
        }

        function renderSlotsCliente() {
            const container = document.getElementById('c-slots');
            const barbero = db.barberos.find(b => b.id === barberoActivoID);
            if(!barbero) return;
            container.innerHTML = HORARIOS_BASE.map(h => {
                const ocupado = barbero.turnos[h];
                if (ocupado) return `<div class="p-3 text-[10px] bg-white/5 border border-white/5 rounded-lg opacity-20 text-center">${h}<br>Ocupado</div>`;
                return `<button onclick="seleccionarHora('${h}', this)" class="p-3 text-sm bg-white/5 border border-white/10 rounded-lg hover:border-cactus transition">${h}</button>`;
            }).join('');
        }

        function seleccionarHora(h, btn) {
            horaSeleccionada = h;
            document.querySelectorAll('#c-slots button').forEach(b => b.classList.remove('bg-cactus', 'text-black', 'border-cactus'));
            btn.classList.add('bg-cactus', 'text-black', 'border-cactus');
        }

        function abrirPago() {
            const nombre = document.getElementById('c-nombre').value;
            if (!nombre || !horaSeleccionada) return alert("Completa tu nombre y elige un horario.");
            const barbero = db.barberos.find(b => b.id === barberoActivoID);
            document.getElementById('pago-barbero-nombre').innerText = barbero.nombre;
            document.getElementById('pago-alias').innerText = barbero.alias;
            document.getElementById('modal-pago').classList.remove('hidden');
        }

        function cerrarModal() { document.getElementById('modal-pago').classList.add('hidden'); }

        function confirmarReserva(metodo) {
            const nombre = document.getElementById('c-nombre').value;
            const barbero = db.barberos.find(b => b.id === barberoActivoID);
            barbero.turnos[horaSeleccionada] = { cliente: nombre, pago: metodo };
            save();
            alert(`¡Turno reservado para las ${horaSeleccionada}!`);
            location.reload();
        }

        function pedirAcceso() {
            const pass = prompt("PIN de Acceso:");
            if (!pass) return;
            if (pass === db.admin_pin) {
                esModoAdmin = true;
                mostrarInterno(true);
            } else {
                const b = db.barberos.find(x => x.pin === pass);
                if (b) {
                    barberoActivoID = b.id;
                    esModoAdmin = false;
                    mostrarInterno(false);
                } else {
                    alert("PIN Incorrecto.");
                }
            }
        }

        function mostrarInterno(esAdmin) {
            document.getElementById('view-cliente').classList.add('hidden');
            document.getElementById('view-interno').classList.remove('hidden');
            document.getElementById('btn-logout').classList.remove('hidden');
            document.getElementById('admin-stats').classList.toggle('hidden', !esAdmin);
            renderTabsAdmin();
            verTab('agenda');
        }

        function verTab(tab) {
            document.getElementById('tab-agenda').classList.toggle('hidden', tab !== 'agenda');
            document.getElementById('tab-config').classList.toggle('hidden', tab !== 'config');
            if(tab === 'agenda') renderAgenda();
            if(tab === 'config') renderConfig();
        }

        function renderTabsAdmin() {
            const container = document.getElementById('admin-tabs');
            container.innerHTML = db.barberos.map(b => `
                <button onclick="cambiarAgendaBarbero(${b.id})" class="px-6 py-2 glass-card border-cactus ${barberoActivoID === b.id ? 'bg-cactus text-black' : 'opacity-50'} text-xs">
                    ${b.nombre}
                </button>
            `).join('');
        }

        function cambiarAgendaBarbero(id) {
            barberoActivoID = id;
            renderTabsAdmin();
            renderAgenda();
        }

        function renderAgenda() {
            const b = db.barberos.find(x => x.id === barberoActivoID);
            if(!b) return;
            document.getElementById('agenda-nombre').innerText = b.nombre;
            const tbody = document.getElementById('agenda-body');
            tbody.innerHTML = HORARIOS_BASE.map(h => {
                const t = b.turnos[h];
                return `
                    <tr class="border-b border-white/5 hover:bg-white/5">
                        <td class="p-3 font-bold text-xs">${h}</td>
                        <td class="p-3 text-sm">${t ? t.cliente : '<span class="opacity-20 italic text-xs">Libre</span>'}</td>
                        <td class="p-3">
                            ${t ? `<span class="px-2 py-1 rounded text-[9px] ${t.pago === 'Transferencia' ? 'bg-blue-500/20 text-blue-400' : 'bg-green-500/20 text-green-400'}">${t.pago}</span>` : '-'}
                        </td>
                        <td class="p-3">
                            ${t ? `<button onclick="borrarTurno('${h}')" class="text-red-400 text-xs">✕</button>` : `<button onclick="anotarLocal('${h}')" class="text-[10px] border border-white/20 px-2 py-1 rounded">+ Anotar</button>`}
                        </td>
                    </tr>
                `;
            }).join('');
            actualizarFinanzas();
        }

        function anotarLocal(h) {
            const n = prompt("Nombre del cliente:");
            if(!n) return;
            db.barberos.find(b => b.id === barberoActivoID).turnos[h] = { cliente: n, pago: "Efectivo" };
            save();
            renderAgenda();
        }

        function borrarTurno(h) {
            if(confirm("¿Borrar turno?")) {
                delete db.barberos.find(b => b.id === barberoActivoID).turnos[h];
                save();
                renderAgenda();
            }
        }

        function cargarGasto() {
            const n = prompt("Nombre del insumo:");
            const v = prompt("Precio:");
            if(n && v) {
                db.insumos.push({ nombre: n, valor: parseFloat(v) });
                save();
                actualizarFinanzas();
            }
        }

        function actualizarFinanzas() {
            let totalCaja = 0;
            db.barberos.forEach(b => { totalCaja += Object.keys(b.turnos).length * 10000; });
            let totalInsumos = db.insumos.reduce((acc, i) => acc + i.valor, 0);
            document.getElementById('stat-caja').innerText = `$${totalCaja.toLocaleString()}`;
            document.getElementById('stat-insumos').innerText = `$${totalInsumos.toLocaleString()}`;
        }

        function cerrarSesion() { location.reload(); }

        inicializarApp();
    </script>
</body>
</html>
