<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Pro | Gestión de Turnos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1c1e 0%, #2d3436 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }
        .cactus-gray { color: #85929E; }
        .bg-cactus { background-color: #85929E; }
        .accent-gold { color: #D4AF37; }
        
        /* Ocultar elementos por defecto */
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col min-h-screen">

    <div class="max-w-6xl mx-auto w-full flex-grow">
        <header class="flex justify-between items-center mb-10 text-center md:text-left">
            <div class="w-full">
                <h1 class="text-3xl font-light tracking-widest uppercase">Barber <span class="font-bold accent-gold">Elite</span></h1>
                <p class="cactus-gray text-sm">Gestión Profesional</p>
            </div>
            <button id="btn-logout" onclick="cerrarSesion()" class="hidden px-4 py-2 rounded-full border border-red-500/50 text-red-400 hover:bg-red-500/10 transition text-sm">
                Salir
            </button>
        </header>

        <main id="main-content">
            <section id="view-cliente" class="space-y-6">
                <div class="glass-card p-8 text-center max-w-2xl mx-auto">
                    <h2 class="text-2xl mb-4">Reserva tu Turno</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <input type="text" placeholder="Tu Nombre" class="bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-cactus-gray">
                        <select class="bg-white/5 border border-white/10 rounded-lg p-3 outline-none">
                            <option value="1">Peluquero: Franco</option>
                            <option value="2">Peluquero: Mateo</option>
                        </select>
                    </div>
                    
                    <div class="grid grid-cols-3 md:grid-cols-4 gap-2 mb-6" id="slots-container">
                        </div>

                    <div class="flex flex-col gap-3">
                        <button class="w-full py-4 bg-white text-black font-bold rounded-xl hover:bg-cactus transition uppercase tracking-tighter">Reservar y Pagar Seña</button>
                        <button class="w-full py-4 border border-white/20 rounded-xl hover:bg-white/5 transition">Solo Reservar (Pago en local)</button>
                    </div>
                </div>
            </section>

            <section id="view-interno" class="hidden space-y-6">
                
                <div id="financial-stats" class="grid grid-cols-1 md:grid-cols-3 gap-6 hidden">
                    <div class="glass-card p-6 border-l-4 border-green-500">
                        <p class="cactus-gray text-xs uppercase tracking-wider">Ganancias Hoy</p>
                        <h3 class="text-3xl font-bold">$125.000</h3>
                    </div>
                    <div class="glass-card p-6 border-l-4 border-blue-500">
                        <p class="cactus-gray text-xs uppercase tracking-wider">Turnos Ocupados</p>
                        <h3 class="text-3xl font-bold">14/32</h3>
                    </div>
                    <div class="glass-card p-6 border-l-4 border-red-500">
                        <p class="cactus-gray text-xs uppercase tracking-wider">Gastos Insumos</p>
                        <h3 class="text-3xl font-bold">$12.400</h3>
                    </div>
                </div>

                <div class="glass-card p-6">
                    <div class="flex flex-wrap justify-between items-center mb-6 gap-4">
                        <div class="flex border-b border-white/10 overflow-x-auto w-full md:w-auto">
                            <button class="px-4 py-2 border-b-2 border-cactus text-sm md:text-base">Franco</button>
                            <button class="px-4 py-2 opacity-50 text-sm md:text-base">Mateo</button>
                        </div>
                        
                        <button onclick="cargarGasto()" class="px-4 py-2 bg-red-900/40 text-red-300 border border-red-500/30 rounded-lg hover:bg-red-900/60 transition text-sm">
                            + Cargar Gasto Insumo
                        </button>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left min-w-[600px]">
                            <thead class="text-xs uppercase cactus-gray">
                                <tr>
                                    <th class="p-4">Hora</th>
                                    <th class="p-4">Cliente</th>
                                    <th class="p-4">Estado</th>
                                    <th class="p-4">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="admin-table-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <footer class="text-center p-4 mt-auto">
        <button onclick="pedirAcceso()" class="opacity-20 hover:opacity-100 transition text-xl" title="Acceso Personal">
            🔒
        </button>
    </footer>

    <script>
        // --- DATOS SIMULADOS ---
        const slots = ["09:00", "09:30", "10:00", "10:30", "11:00", "11:30", "15:00", "15:30", "16:00", "16:30"];
        const appointments = [
            { time: "09:00", name: "Carlos Perez", paid: "Seña", status: "Confirmado" },
            { time: "09:30", name: "Juan Gomez", paid: "Pendiente", status: "Confirmado" }
        ];

        // --- SISTEMA DE LOGIN Y ROLES ---
        function pedirAcceso() {
            const pin = prompt("Ingrese su PIN de acceso:");
            
            if (pin === "admin") {
                // Modo Dueño: Ve todo
                document.getElementById('view-cliente').classList.add('hidden');
                document.getElementById('view-interno').classList.remove('hidden');
                document.getElementById('financial-stats').classList.remove('hidden');
                document.getElementById('btn-logout').classList.remove('hidden');
                alert("Bienvenido Administrador. Tienes acceso completo.");
            } else if (pin === "1234") {
                // Modo Peluquero/Empleado: No ve finanzas
                document.getElementById('view-cliente').classList.add('hidden');
                document.getElementById('view-interno').classList.remove('hidden');
                document.getElementById('financial-stats').classList.add('hidden'); // ESTO OCULTA LAS GANANCIAS
                document.getElementById('btn-logout').classList.remove('hidden');
                alert("Acceso de Personal. Modo operativo activado.");
            } else if (pin !== null) {
                alert("PIN incorrecto.");
            }
        }

        function cerrarSesion() {
            document.getElementById('view-interno').classList.add('hidden');
            document.getElementById('view-cliente').classList.remove('hidden');
            document.getElementById('btn-logout').classList.add('hidden');
        }

        function cargarGasto() {
            const concepto = prompt("¿Qué insumo se compró? (Ej: Cera, Filos, Alcohol)");
            if(concepto) {
                const monto = prompt(`¿Cuánto se gastó en ${concepto}?`);
                if(monto) {
                    alert(`✅ Gasto de $${monto} en ${concepto} registrado correctamente.`);
                    // Aquí en el futuro se guardará en la base de datos
                }
            }
        }

        function anotarClienteManual(hora) {
            const nombre = prompt(`Anotar cliente (sin turno previo) para las ${hora}:`);
            if(nombre) {
                alert(`✅ Cliente ${nombre} anotado a las ${hora}.`);
                // Aquí en el futuro se actualizará la tabla
            }
        }

        // --- RENDERIZADO DE INTERFAZ ---
        
        // 1. Renderizar botones vista cliente
        const slotsContainer = document.getElementById('slots-container');
        slots.forEach(time => {
            const btn = document.createElement('button');
            btn.className = "p-3 text-xs bg-white/5 border border-white/10 rounded-lg hover:bg-cactus hover:text-black transition";
            btn.innerText = time;
            slotsContainer.appendChild(btn);
        });

        // 2. Renderizar tabla vista interna
        const adminTable = document.getElementById('admin-table-body');
        slots.forEach(time => {
            const appt = appointments.find(a => a.time === time);
            const row = document.createElement('tr');
            row.className = "border-b border-white/5 hover:bg-white/5";
            
            if(appt) {
                // Si hay turno ocupado
                row.innerHTML = `
                    <td class="p-4 font-bold text-cactus-gray">${time}</td>
                    <td class="p-4">${appt.name}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-xs ${appt.paid === 'Seña' ? 'bg-blue-500/20 text-blue-400' : 'bg-yellow-500/20 text-yellow-400'}">${appt.paid}</span></td>
                    <td class="p-4"><button class="text-xs bg-green-600/20 text-green-400 px-3 py-1 rounded border border-green-500/50">Avisar WhatsApp</button></td>
                `;
            } else {
                // Si el turno está libre (Permite anotar cliente de paso)
                row.innerHTML = `
                    <td class="p-4 font-bold opacity-50">${time}</td>
                    <td class="p-4 opacity-30 italic">Libre</td>
                    <td class="p-4">-</td>
                    <td class="p-4"><button onclick="anotarClienteManual('${time}')" class="text-xs bg-white/10 text-white px-3 py-1 rounded border border-white/20 hover:bg-white/20 transition">+ Anotar Local</button></td>
                `;
            }
            adminTable.appendChild(row);
        });
    </script>
</body>
</html>
