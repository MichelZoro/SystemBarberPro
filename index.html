<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Pro | Gestión de Turnos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1c1e 0%, #2d3436 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }
        .cactus-gray { color: #85929E; }
        .bg-cactus { background-color: #85929E; }
        .accent-gold { color: #D4AF37; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-light tracking-widest uppercase">Barber <span class="font-bold accent-gold">Elite</span></h1>
                <p class="cactus-gray text-sm">Gestión Profesional de Barbería</p>
            </div>
            <div class="flex gap-4">
                <button onclick="switchView('cliente')" class="px-4 py-2 rounded-full border border-white/20 hover:bg-white/10 transition">Vista Cliente</button>
                <button onclick="switchView('admin')" class="px-4 py-2 rounded-full bg-cactus text-gray-900 font-semibold hover:opacity-90 transition">Admin Panel</button>
            </div>
        </header>

        <main id="main-content">
            <section id="view-cliente" class="space-y-6">
                <div class="glass-card p-8 text-center max-w-2xl mx-auto">
                    <h2 class="text-2xl mb-4">Reserva tu Turno</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <input type="text" placeholder="Tu Nombre" class="bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-cactus-gray">
                        <select id="select-peluquero" class="bg-white/5 border border-white/10 rounded-lg p-3 outline-none">
                            <option value="1">Peluquero: Franco</option>
                            <option value="2">Peluquero: Mateo</option>
                        </select>
                    </div>
                    
                    <div class="grid grid-cols-4 gap-2 mb-6" id="slots-container">
                        </div>

                    <div class="flex flex-col gap-3">
                        <button class="w-full py-4 bg-white text-black font-bold rounded-xl hover:bg-cactus transition uppercase tracking-tighter">Reservar y Pagar Seña</button>
                        <button class="w-full py-4 border border-white/20 rounded-xl hover:bg-white/5 transition">Solo Reservar (Pago en local)</button>
                    </div>
                </div>
            </section>

            <section id="view-admin" class="hidden space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass-card p-6 border-l-4 border-green-500">
                        <p class="cactus-gray text-xs uppercase tracking-wider">Ganancias Hoy</p>
                        <h3 class="text-3xl font-bold">$125.000</h3>
                    </div>
                    <div class="glass-card p-6 border-l-4 border-blue-500">
                        <p class="cactus-gray text-xs uppercase tracking-wider">Turnos Totales (Global)</p>
                        <h3 class="text-3xl font-bold" id="total-slots">32/32 Disponibles</h3>
                    </div>
                    <div class="glass-card p-6 border-l-4 border-red-500">
                        <p class="cactus-gray text-xs uppercase tracking-wider">Gastos Insumos</p>
                        <h3 class="text-3xl font-bold">$12.400</h3>
                    </div>
                </div>

                <div class="glass-card p-6">
                    <div class="flex border-b border-white/10 mb-6 overflow-x-auto">
                        <button class="px-6 py-3 border-b-2 border-cactus">Peluquero: Franco</button>
                        <button class="px-6 py-3 opacity-50">Peluquero: Mateo</button>
                        <button class="px-6 py-3 opacity-50">Inventario</button>
                        <button class="px-6 py-3 opacity-50">Configurar Horarios</button>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="text-xs uppercase cactus-gray">
                                <tr>
                                    <th class="p-4">Hora</th>
                                    <th class="p-4">Cliente</th>
                                    <th class="p-4">Estado Pago</th>
                                    <th class="p-4">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="admin-table-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Lógica de Navegación
        function switchView(view) {
            document.getElementById('view-cliente').classList.toggle('hidden', view !== 'cliente');
            document.getElementById('view-admin').classList.toggle('hidden', view !== 'admin');
        }

        // Simulación de Datos
        const slots = ["09:00", "09:30", "10:00", "10:30", "11:00", "11:30", "15:00", "15:30", "16:00", "16:30"];
        const appointments = [
            { time: "09:00", name: "Carlos Perez", paid: "Seña", status: "Confirmado" },
            { time: "09:30", name: "Juan Gomez", paid: "Pendiente", status: "Confirmado" }
        ];

        // Renderizar Slots Cliente
        const slotsContainer = document.getElementById('slots-container');
        slots.forEach(time => {
            const btn = document.createElement('button');
            btn.className = "p-3 text-xs bg-white/5 border border-white/10 rounded-lg hover:bg-cactus hover:text-black transition";
            btn.innerText = time;
            slotsContainer.appendChild(btn);
        });

        // Renderizar Tabla Admin
        const adminTable = document.getElementById('admin-table-body');
        slots.forEach(time => {
            const appt = appointments.find(a => a.time === time);
            const row = document.createElement('tr');
            row.className = "border-b border-white/5 hover:bg-white/5";
            row.innerHTML = `
                <td class="p-4 font-bold text-cactus-gray">${time}</td>
                <td class="p-4">${appt ? appt.name : '<span class="opacity-30">Libre</span>'}</td>
                <td class="p-4">${appt ? `<span class="px-2 py-1 rounded text-xs ${appt.paid === 'Seña' ? 'bg-blue-500/20 text-blue-400' : 'bg-yellow-500/20 text-yellow-400'}">${appt.paid}</span>` : '-'}</td>
                <td class="p-4">
                    ${appt ? `<button class="text-xs bg-green-600/20 text-green-400 px-3 py-1 rounded border border-green-500/50">WhatsApp</button>` : '<button class="text-xs opacity-50">Bloquear</button>'}
                </td>
            `;
            adminTable.appendChild(row);
        });
    </script>
</body>
</html>
