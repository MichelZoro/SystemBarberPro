<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Pro | Gestión de Turnos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1c1e 0%, #2d3436 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }
        .cactus-gray { color: #85929E; }
        .bg-cactus { background-color: #85929E; }
        .accent-gold { color: #D4AF37; }
        .hidden { display: none !important; }
        
        input, select {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col min-h-screen">

    <div class="max-w-6xl mx-auto w-full flex-grow">
        <header class="flex justify-between items-center mb-10">
            <div class="w-full text-center md:text-left">
                <h1 class="text-3xl font-light tracking-widest uppercase">Barber <span class="font-bold accent-gold">Elite</span></h1>
                <p class="cactus-gray text-sm">Gestión Profesional</p>
            </div>
            <button id="btn-logout" onclick="cerrarSesion()" class="hidden px-4 py-2 rounded-full border border-red-500/50 text-red-400 hover:bg-red-500/10 transition text-sm">
                Salir
            </button>
        </header>

        <main id="main-content">
            <section id="view-cliente" class="space-y-6">
                <div class="glass-card p-8 text-center max-w-2xl mx-auto">
                    <h2 class="text-2xl mb-4">Reserva tu Turno</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <input type="text" id="cliente-nombre" placeholder="Escribe tu Nombre" class="rounded-lg p-3 outline-none focus:border-cactus-gray">
                        <select id="cliente-peluquero" class="rounded-lg p-3 outline-none">
                            <option value="Franco">Peluquero: Franco</option>
                            <option value="Mateo">Peluquero: Mateo</option>
                        </select>
                    </div>
                    
                    <p class="text-xs cactus-gray mb-2 uppercase">Selecciona Horario disponible:</p>
                    <div class="grid grid-cols-3 md:grid-cols-4 gap-2 mb-6" id="slots-container">
                        </div>

                    <div class="flex flex-col gap-3">
                        <button onclick="realizarReserva('Seña')" class="w-full py-4 bg-white text-black font-bold rounded-xl hover:bg-cactus transition uppercase tracking-tighter">Pagar Seña y Reservar</button>
                        <button onclick="realizarReserva('Pendiente')" class="w-full py-4 border border-white/20 rounded-xl hover:bg-white/5 transition">Solo Reservar (Pago en local)</button>
                    </div>
                </div>
            </section>

            <section id="view-interno" class="hidden space-y-6">
                
                <div id="financial-stats" class="grid grid-cols-1 md:grid-cols-3 gap-6 hidden">
                    <div class="glass-card p-6 border-l-4 border-green-500">
                        <p class="cactus-gray text-xs uppercase tracking-wider">Caja Hoy (Ventas)</p>
                        <h3 class="text-3xl font-bold" id="stat-ganancias">$0</h3>
                    </div>
                    <div class="glass-card p-6 border-l-4 border-red-500">
                        <p class="cactus-gray text-xs uppercase tracking-wider">Total Gastos Insumos</p>
                        <h3 class="text-3xl font-bold" id="stat-gastos">$0</h3>
                    </div>
                    <div class="glass-card p-6 border-l-4 border-blue-500">
                        <p class="cactus-gray text-xs uppercase tracking-wider">Balance Neto</p>
                        <h3 class="text-3xl font-bold" id="stat-balance">$0</h3>
                    </div>
                </div>

                <div class="glass-card p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl font-bold">Agenda de Hoy</h3>
                        <button onclick="cargarGasto()" class="px-4 py-2 bg-red-900/40 text-red-300 border border-red-500/30 rounded-lg hover:bg-red-900/60 transition text-sm">
                            + Cargar Gasto
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left min-w-[600px]">
                            <thead class="text-xs uppercase cactus-gray">
                                <tr class="border-b border-white/10">
                                    <th class="p-4">Hora</th>
                                    <th class="p-4">Cliente</th>
                                    <th class="p-4">Peluquero</th>
                                    <th class="p-4">Estado Pago</th>
                                    <th class="p-4">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="admin-table-body"></tbody>
                        </table>
                    </div>
                </div>

                <div class="glass-card p-6">
                    <h3 class="text-xl font-bold mb-4">Detalle de Gastos e Insumos</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="text-xs uppercase cactus-gray">
                                <tr class="border-b border-white/10">
                                    <th class="p-4">Insumo / Concepto</th>
                                    <th class="p-4">Valor</th>
                                </tr>
                            </thead>
                            <tbody id="insumos-table-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <footer class="text-center p-4 mt-auto">
        <button onclick="pedirAcceso()" class="opacity-20 hover:opacity-100 transition text-xl">🔒</button>
    </footer>

    <script>
        // ESTADO DE LA APP
        let currentRole = 'cliente';
        let selectedTime = null;
        
        const turnos = [
            { h: "09:00", cliente: "", peluquero: "", pago: "" },
            { h: "09:30", cliente: "", peluquero: "", pago: "" },
            { h: "10:00", cliente: "", peluquero: "", pago: "" },
            { h: "10:30", cliente: "", peluquero: "", pago: "" },
            { h: "11:00", cliente: "", peluquero: "", pago: "" },
            { h: "11:30", cliente: "", peluquero: "", pago: "" },
            { h: "15:00", cliente: "", peluquero: "", pago: "" },
            { h: "15:30", cliente: "", peluquero: "", pago: "" },
            { h: "16:00", cliente: "", peluquero: "", pago: "" }
        ];

        const insumos = [];
        const PRECIO_CORTE = 10000; // Ejemplo de valor de corte

        // --- FUNCIONES DE NAVEGACIÓN ---
        function pedirAcceso() {
            const pin = prompt("PIN de Acceso:");
            if (pin === "admin") {
                currentRole = "admin";
                mostrarVistaInterna(true);
            } else if (pin === "1234") {
                currentRole = "staff";
                mostrarVistaInterna(false);
            }
        }

        function mostrarVistaInterna(esAdmin) {
            document.getElementById('view-cliente').classList.add('hidden');
            document.getElementById('view-interno').classList.remove('hidden');
            document.getElementById('btn-logout').classList.remove('hidden');
            document.getElementById('financial-stats').classList.toggle('hidden', !esAdmin);
            actualizarTablas();
        }

        function cerrarSesion() {
            location.reload(); // Forma más limpia de resetear la vista
        }

        // --- LÓGICA DE NEGOCIO ---
        function seleccionarHora(h, btn) {
            selectedTime = h;
            document.querySelectorAll('#slots-container button').forEach(b => b.classList.remove('bg-cactus', 'text-black'));
            btn.classList.add('bg-cactus', 'text-black');
        }

        function realizarReserva(tipoPago) {
            const nombre = document.getElementById('cliente-nombre').value;
            const peluquero = document.getElementById('cliente-peluquero').value;

            if (!nombre || !selectedTime) {
                alert("Por favor, escribe tu nombre y selecciona una hora.");
                return;
            }

            const t = turnos.find(x => x.h === selectedTime);
            if(t.cliente) {
                alert("Este turno ya fue tomado.");
                return;
            }

            t.cliente = nombre;
            t.peluquero = peluquero;
            t.pago = tipoPago;

            alert(`¡Gracias ${nombre}! Turno reservado para las ${selectedTime}.`);
            renderSlots();
            document.getElementById('cliente-nombre').value = "";
        }

        function cargarGasto() {
            const item = prompt("Nombre del Insumo (ej: Cuchillas Gilette):");
            if (!item) return;
            const valor = parseFloat(prompt(`Valor de "${item}":`));
            
            if (valor) {
                insumos.push({ nombre: item, precio: valor });
                actualizarTablas();
            }
        }

        function anotarLocal(hora) {
            const nombre = prompt(`Nombre del cliente para las ${hora}:`);
            if(nombre) {
                const t = turnos.find(x => x.h === hora);
                t.cliente = nombre;
                t.peluquero = "Local";
                t.pago = "Pendiente";
                actualizarTablas();
            }
        }

        // --- RENDERIZADO ---
        function renderSlots() {
            const container = document.getElementById('slots-container');
            container.innerHTML = "";
            turnos.forEach(t => {
                if (!t.cliente) {
                    const btn = document.createElement('button');
                    btn.className = "p-3 text-xs border border-white/10 rounded-lg hover:bg-white/10 transition";
                    btn.innerText = t.h;
                    btn.onclick = () => seleccionarHora(t.h, btn);
                    container.appendChild(btn);
                }
            });
        }

        function actualizarTablas() {
            const tbody = document.getElementById('admin-table-body');
            const insumosBody = document.getElementById('insumos-table-body');
            tbody.innerHTML = "";
            insumosBody.innerHTML = "";

            let totalGanado = 0;
            let totalGastos = 0;

            // Tabla Turnos
            turnos.forEach(t => {
                if(t.cliente) totalGanado += PRECIO_CORTE;
                const row = `
                    <tr class="border-b border-white/5 hover:bg-white/5">
                        <td class="p-4 font-bold text-cactus-gray">${t.h}</td>
                        <td class="p-4">${t.cliente || '<span class="opacity-20">Libre</span>'}</td>
                        <td class="p-4 text-sm">${t.peluquero || '-'}</td>
                        <td class="p-4">
                            ${t.cliente ? `<span class="px-2 py-1 rounded text-[10px] ${t.pago === 'Seña' ? 'bg-blue-500/20 text-blue-400' : 'bg-yellow-500/20 text-yellow-400'}">${t.pago}</span>` : '-'}
                        </td>
                        <td class="p-4">
                            ${t.cliente ? `<button class="text-[10px] border border-green-500/50 text-green-400 px-2 py-1 rounded">WhatsApp</button>` : `<button onclick="anotarLocal('${t.h}')" class="text-[10px] bg-white/10 px-2 py-1 rounded">+ Anotar</button>`}
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });

            // Tabla Insumos
            insumos.forEach(i => {
                totalGastos += i.precio;
                insumosBody.innerHTML += `
                    <tr class="border-b border-white/5">
                        <td class="p-4 text-sm">${i.nombre}</td>
                        <td class="p-4 font-bold text-red-400">$${i.precio.toLocaleString()}</td>
                    </tr>
                `;
            });

            // Stats
            document.getElementById('stat-ganancias').innerText = `$${totalGanado.toLocaleString()}`;
            document.getElementById('stat-gastos').innerText = `$${totalGastos.toLocaleString()}`;
            document.getElementById('stat-balance').innerText = `$${(totalGanado - totalGastos).toLocaleString()}`;
        }

        // Inicio
        renderSlots();
    </script>
</body>
</html>
